---
language:
  - 'python'
sudo: required
dist: trusty
addons:
  postgresql: "9.6"
before_install:
  - git submodule update --init --recursive
install:
  - vagrant/install-on-travis-ci.sh
before_script:
  - psql -U postgres -c "create extension postgis"
  - cd $TRAVIS_BUILD_DIR/build
  - wget --no-verbose --output-document=../data/testdb.pbf http://lonvia.de/nominatim/testdb.pbf
  - ./utils/setup.php --osm-file ../data/testdb.pbf --osm2pgsql-cache 2000 --all 2>&1 | grep -v 'ETA (seconds)'
  - psql -l
  - ./utils/specialphrases.php --wiki-import > ../data/specialphrases.sql
  - psql -d test_api_nominatim -f ../data/specialphrases.sql
script:
  - cd $TRAVIS_BUILD_DIR/tests
  - phpunit ./
  - cd $TRAVIS_BUILD_DIR/tests/bdd
  - behave
  - #lettuce features/api --verbosity=1
  - #lettuce features/db --verbosity=1 -t -Fail -t -Tiger -t -poldi-only
  - #lettuce features/osm2pgsql --verbosity=1 -t -Fail
notifications:
  email: false
