---
sudo: required
dist: trusty
language: python
python:
  - "3.6"
addons:
  postgresql: "9.6"
git:
  depth: 3
before_install:
  - git submodule update --init --recursive
install:
  - vagrant/install-on-travis-ci.sh
before_script:
  - psql -U postgres -c "create extension postgis"
  - cd $TRAVIS_BUILD_DIR/build
  - wget --no-verbose --output-document=../data/monaco.osm.pbf http://download.geofabrik.de/europe/monaco-latest.osm.pbf
  - ./utils/setup.php --osm-file ../data/monaco.osm.pbf --osm2pgsql-cache 1000 --all 2>&1 | grep -v 'ETA (seconds)'
  - ./utils/specialphrases.php --countries > ../data/specialphrases_countries.sql
  - psql -d test_api_nominatim -f ../data/specialphrases_countries.sql

script:
  - cd $TRAVIS_BUILD_DIR/tests/php
  - phpunit ./
  - cd $TRAVIS_BUILD_DIR/tests/bdd
  - behave --format=progres3 features/api
  - behave --format=progres3 features/db
  - behave --format=progres3 features/osm2pgsql
notifications:
  email: false
